<!--
name: 2-Column Grid
category: Layouts
description: Equal two-column grid layout with slots
slots: col-1, col-2
-->
<div class="layout-grid-2" data-block="grid-2-col" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; padding: 1.5rem;">
  <div data-slot="col-1" style="min-height: 80px;"></div>
  <div data-slot="col-2" style="min-height: 80px;"></div>
</div>
