<!--
  PATTERN: Metric-Led Hero
  CATEGORY: hero
  TECHNIQUES: metric-prominence, restrained-palette, clear-hierarchy

  DESIGN RATIONALE:
  Opening with a number creates instant credibility. The brain processes
  data as proof. Centered vertical stack keeps focus entirely on the
  metric — no competing visual interest. The eyebrow contextualizes the
  number before you read it (you know what "99.99%" means before your
  eyes land on it). Social proof strip below the CTA compounds credibility.
-->

<style>
  /* Token block */
  .hero-metric-led {
    --color-bg: #ffffff;
    --color-text: #111827;
    --color-text-muted: #6b7280;
    --color-primary: #2563eb;
    --color-primary-hover: #1d4ed8;
    --color-surface: #f9fafb;
    --color-border: #e5e7eb;
    --radius-md: 0.5rem;
    --font-sans: system-ui, -apple-system, sans-serif;
  }
</style>

<section class="hero-metric-led">
  <style>
    /* ── Layout ──────────────────────────────────────────────────────────
       Centered vertical stack. No columns — the metric needs the full
       width to land with impact. text-align center works here because
       the content is short enough that long line-lengths aren't a risk.
    ─────────────────────────────────────────────────────────────────── */
    .hero-metric-led {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 6rem 4rem;
      background-color: var(--color-bg);
      font-family: var(--font-sans);
      box-sizing: border-box;
      gap: 0; /* controlled by child margins instead for precision */
    }

    /* ── Eyebrow ─────────────────────────────────────────────────────────
       Appears ABOVE the metric so the reader knows context before
       the number lands. This is crucial — a bare number reads as random.
       Primary color treatment signals it's part of the metric's meaning.
    ─────────────────────────────────────────────────────────────────── */
    .hero-metric-led__eyebrow {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-primary);
      margin: 0 0 1rem;
    }

    /* ── Primary metric ──────────────────────────────────────────────────
       The hero. clamp(3.5rem, 8vw, 6rem) ensures it's always massive
       but never overflows its container. Weight 700 (not 800) because
       at this size, ultra-bold becomes illegible on screen. The tight
       line-height (1) and -0.04em tracking are essential at display sizes
       — letters need to feel like a unit, not individual characters.
    ─────────────────────────────────────────────────────────────────── */
    .hero-metric-led__metric {
      font-size: clamp(3.5rem, 8vw, 6rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--color-text);
      margin: 0 0 1.5rem;
    }

    /* ── Explanation ─────────────────────────────────────────────────────
       1.25rem is large enough to feel like a subtitle, not body copy.
       max-width 42ch is wider than a headline limit but shorter than body
       copy — this is a single explanatory sentence, not a paragraph.
    ─────────────────────────────────────────────────────────────────── */
    .hero-metric-led__explanation {
      font-size: 1.25rem;
      line-height: 1.55;
      color: var(--color-text-muted);
      max-width: 42ch;
      margin: 0 0 2.5rem;
    }

    /* ── Single CTA ──────────────────────────────────────────────────────
       Single action — no secondary option competing with it.
       The metric already sold them; the CTA is the conversion point.
    ─────────────────────────────────────────────────────────────────── */
    .hero-metric-led__cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.9375rem 2rem;
      background-color: var(--color-primary);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      margin-bottom: 3rem;
      transition: background-color 0.15s ease;
    }

    .hero-metric-led__cta:hover {
      background-color: var(--color-primary-hover);
    }

    /* ── Social proof strip ──────────────────────────────────────────────
       border-top acts as a visual separator from the CTA above.
       The strip uses the same pattern as the main metric at small scale:
       number + label. Muted colors prevent it from competing with the
       main metric while still adding credibility mass.
    ─────────────────────────────────────────────────────────────────── */
    .hero-metric-led__proof-strip {
      display: flex;
      align-items: center;
      gap: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--color-border);
    }

    .hero-metric-led__proof-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    /* Proof metric: large enough to read, small enough not to compete */
    .hero-metric-led__proof-value {
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--color-text);
      line-height: 1;
    }

    .hero-metric-led__proof-label {
      font-size: 0.8125rem;
      color: var(--color-text-muted);
      white-space: nowrap;
    }

    /* Vertical divider between proof items */
    .hero-metric-led__proof-divider {
      width: 1px;
      height: 2rem;
      background-color: var(--color-border);
      flex-shrink: 0;
    }
  </style>

  <!-- Eyebrow contextualizes the metric before the eye reaches it -->
  <p class="hero-metric-led__eyebrow">Trusted by engineering teams worldwide</p>

  <!-- THE metric — this is the entire point of the layout -->
  <p class="hero-metric-led__metric">99.99%</p>

  <!-- Explanation: one sentence to give the number meaning -->
  <p class="hero-metric-led__explanation">
    Uptime across all regions in the past 12 months. Built for teams who can't afford downtime.
  </p>

  <!-- Single CTA — the metric already sold them -->
  <a href="#" class="hero-metric-led__cta">
    Start building free
    <i class="lucide-arrow-right"></i>
  </a>

  <!-- Social proof strip: 3 items, same pattern at smaller scale -->
  <div class="hero-metric-led__proof-strip" aria-label="Additional proof points">
    <div class="hero-metric-led__proof-item">
      <!-- Teams count: social proof by volume -->
      <span class="hero-metric-led__proof-value">14,000+</span>
      <span class="hero-metric-led__proof-label">teams shipping</span>
    </div>

    <div class="hero-metric-led__proof-divider" aria-hidden="true"></div>

    <div class="hero-metric-led__proof-item">
      <!-- Uptime at item scale reinforces main metric -->
      <span class="hero-metric-led__proof-value">99.99%</span>
      <span class="hero-metric-led__proof-label">uptime SLA</span>
    </div>

    <div class="hero-metric-led__proof-divider" aria-hidden="true"></div>

    <div class="hero-metric-led__proof-item">
      <!-- Certification: third-party validation -->
      <span class="hero-metric-led__proof-value">SOC 2</span>
      <span class="hero-metric-led__proof-label">Type II certified</span>
    </div>
  </div>
</section>
