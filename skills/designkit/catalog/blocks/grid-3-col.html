<!--
name: 3-Column Grid
category: Layouts
description: Three equal columns with slots
slots: col-1, col-2, col-3
-->
<div class="layout-grid-3" data-block="grid-3-col" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; padding: 1.5rem;">
  <div data-slot="col-1" style="min-height: 80px;"></div>
  <div data-slot="col-2" style="min-height: 80px;"></div>
  <div data-slot="col-3" style="min-height: 80px;"></div>
</div>
