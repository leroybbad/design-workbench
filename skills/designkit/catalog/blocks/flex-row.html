<!--
name: Flex Row
category: Layouts
description: Horizontal flex row — items size to content, wraps on small screens
slots: content
-->
<div class="layout-flex-row" data-block="flex-row" style="display: flex; flex-wrap: wrap; gap: 1rem; padding: 1.5rem; align-items: flex-start;">

</div>
