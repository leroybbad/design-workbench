<!--
name: 4-Column Grid
category: Layouts
description: Four equal columns — good for stats, small cards
slots: col-1, col-2, col-3, col-4
-->
<div class="layout-grid-4" data-block="grid-4-col" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; padding: 1.5rem;">
  <div data-slot="col-1" style="min-height: 80px;"></div>
  <div data-slot="col-2" style="min-height: 80px;"></div>
  <div data-slot="col-3" style="min-height: 80px;"></div>
  <div data-slot="col-4" style="min-height: 80px;"></div>
</div>
