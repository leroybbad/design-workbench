<!--
name: 60/40 Split
category: Layouts
description: Wider left column with narrower right — content + aside
slots: primary, secondary
-->
<div class="layout-split-60-40" data-block="split-60-40" style="display: grid; grid-template-columns: 3fr 2fr; gap: 1.5rem; padding: 1.5rem;">
  <div data-slot="primary" style="min-height: 120px;"></div>
  <div data-slot="secondary" style="min-height: 120px;"></div>
</div>
