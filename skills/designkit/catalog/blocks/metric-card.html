<!--
name: Metric Card
category: Cards
description: KPI display with label, value, and trend indicator
slots: none
-->
<div class="metric-card" data-block="metric-card" style="padding: 1.5rem; background: var(--color-surface, #fff); border: 1px solid var(--color-border, #e5e7eb); border-radius: 10px;">
  <span class="metric-label" style="font-size: 0.875rem; color: var(--color-text-secondary, #6b7280);">Revenue</span>
  <div class="metric-value" style="font-size: 1.5rem; font-weight: 600; color: var(--color-text, #1a1a2e); margin: 0.25rem 0;">$24,500</div>
  <span class="metric-trend" style="font-size: 0.875rem; color: var(--color-success, #059669);">+12.5%</span>
</div>
